name: Rust CI

on:
  push:
    branches: [master]
    paths:
      - 'src/vela/vela-core/**'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/vela/vela-core/**'
      - '.github/workflows/rust.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/vela/vela-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check compilation
        working-directory: src/vela/vela-core
        run: cargo check --workspace --exclude vela-ffi

  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('src/vela/vela-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        working-directory: src/vela/vela-core
        run: cargo test --workspace --exclude vela-ffi

  lint:
    name: Clippy + Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('src/vela/vela-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: src/vela/vela-core
        run: cargo fmt --all --check

      - name: Run clippy
        working-directory: src/vela/vela-core
        run: cargo clippy --workspace --exclude vela-ffi -- -D warnings
